name: CI

on:
  push:
    branches: [main, develop, feature-v1]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'

jobs:
  # ─── Backend: сборка + unit тесты ───
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          # .NET 10 может быть в preview, разрешаем prerelease
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: backend
        run: dotnet restore LlmProxy.slnx

      - name: Run Unit Tests
        working-directory: backend
        run: dotnet test tests/LlmProxy.Tests.Unit/LlmProxy.Tests.Unit.csproj --verbosity normal

  # ─── Frontend: сборка + тесты ───
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test -- --coverage

  # ─── Интеграционные тесты ───
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: litellm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: backend
        run: dotnet restore LlmProxy.slnx

      - name: Run Integration Tests
        working-directory: backend
        env:
          DATABASE_URL: Host=localhost;Port=5432;Database=litellm;Username=user;Password=password
          REDIS_CONNECTION: localhost:6379
          LITELLM_MASTER_KEY: sk_test_ci_key
        run: dotnet test tests/LlmProxy.Tests.Integration/LlmProxy.Tests.Integration.csproj --verbosity normal

  # ─── Docker Compose sanity check ───
  docker-compose:
    name: Docker Compose Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create .env file
        working-directory: backend
        run: |
          echo "LITELLM_MASTER_KEY=sk_test_ci_key" > .env
          echo "DATABASE_URL=Host=postgres;Port=5432;Database=litellm;Username=user;Password=password" >> .env

      - name: Validate Docker Compose
        working-directory: backend
        run: docker compose config

      - name: Build Docker images
        working-directory: backend
        run: docker compose build
