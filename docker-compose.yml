version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: src/LlmProxy.App/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - REDIS_CONNECTION=${REDIS_CONNECTION:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    volumes:
      - app_logs:/app/logs

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Ollama - локальный LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # vLLM - OpenAI-compatible
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    environment:
      - MODEL=${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
    volumes:
      - vllm_data:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  vllm_data:
  app_logs: