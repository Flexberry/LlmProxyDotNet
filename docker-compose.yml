version: '3.8'

services:
  # Backend .NET API
  app:
    build:
      context: .
      dockerfile: src/LlmProxy.App/Dockerfile
    ports:
      - "4000:4000"
    environment:
      # PostgreSQL - явное подключение к контейнеру postgres
      - DATABASE_URL=Host=postgres;Port=5432;Database=litellm;Username=user;Password=password
      # Мастер ключ (для админ-панели)
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      # Конфигурация провайдеров
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - REDIS_CONNECTION=redis://redis:6379
      # API ключи провайдеров (через переменные окружения)
      - LlmConfig__Providers__openai__ApiKey=${OPENAI_API_KEY}
      - LlmConfig__Providers__openrouter__ApiKey=${OPENROUTER_API_KEY}
      - LlmConfig__Providers__zai__ApiKey=${ZAI_API_KEY}
      # Internal URLs для локальных провайдеров
      - LlmConfig__Providers__ollama__BaseUrl=http://ollama:11434
      - LlmConfig__Providers__vllm__BaseUrl=http://vllm:8000
    depends_on:
      - postgres
      - redis
      - ollama
      - vllm
    restart: unless-stopped
    volumes:
      - app_logs:/app/logs
    networks:
      - llm-network

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - llm-network

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - llm-network

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - llm-network

  # Ollama - локальный LLM
  ollama:
    build:
      context: docker/ollama
      dockerfile: Dockerfile
    environment:
      - OLLAMA_MODELS=llama3.2:latest mistral:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - llm-network

  # vLLM - OpenAI-compatible
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    environment:
      - MODEL=${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
    volumes:
      - vllm_data:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - llm-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  vllm_data:
  app_logs:

networks:
  llm-network:
    driver: bridge